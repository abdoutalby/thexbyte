name = "thexbyte-contact"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# After deploying, add a custom domain in Cloudflare dashboard:
# Workers & Pages → thexbyte-contact → Settings → Domains & Routes → Add: api.thexbyte.tn

[vars]
# Non-secret config
FROM_EMAIL     = "TheXbyte <noreply@send.thexbyte.tn>"
TO_EMAIL       = "hello@thexbyte.tn"
ALLOWED_ORIGIN = "https://thexbyte.tn"

# Secret — set with:  npx wrangler secret put RESEND_API_KEY
